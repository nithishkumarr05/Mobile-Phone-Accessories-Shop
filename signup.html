<body>

    <script>
        (function() {
            // ---------- THEME TOGGLE ----------
            const themeToggle = document.getElementById('theme-toggle');

            function setTheme(isDark) {
                if (isDark) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }

                const icon = themeToggle?.querySelector('i');
                if (icon) {
                    icon.classList.remove('fa-sun', 'fa-moon');
                    icon.classList.add(isDark ? 'fa-moon' : 'fa-sun');
                }

                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            }

            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                setTheme(true);
            } else if (savedTheme === 'light') {
                setTheme(false);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                setTheme(true);
            } else {
                setTheme(false);
            }

            if (themeToggle) {
                themeToggle.addEventListener('click', (e) => {
                    e.preventDefault();
                    setTheme(!document.documentElement.classList.contains('dark'));
                });
            }

            // ---------- RTL TOGGLE ----------
            const rtlBtn = document.getElementById('rtl-toggle');

            function setRTL(isRTL) {
                if (isRTL) {
                    document.documentElement.dir = 'rtl';
                    document.documentElement.lang = 'ar';
                    localStorage.setItem('dir', 'rtl');
                } else {
                    document.documentElement.dir = 'ltr';
                    document.documentElement.lang = 'en';
                    localStorage.setItem('dir', 'ltr');
                }
            }

            const savedDir = localStorage.getItem('dir');
            savedDir === 'rtl' ? setRTL(true) : setRTL(false);

            if (rtlBtn) {
                rtlBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    setRTL(document.documentElement.dir !== 'rtl');
                });
            }

            // ---------- PASSWORD VISIBILITY TOGGLE ----------
            document.querySelectorAll('.toggle-password').forEach(button => {
                button.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('data-target');
                    const passwordInput = document.getElementById(targetId);
                    if (passwordInput) {
                        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                        passwordInput.setAttribute('type', type);
                        const icon = this.querySelector('i');
                        if (icon) {
                            if (type === 'text') {
                                icon.classList.remove('fa-eye-slash');
                                icon.classList.add('fa-eye');
                            } else {
                                icon.classList.remove('fa-eye');
                                icon.classList.add('fa-eye-slash');
                            }
                        }
                    }
                });
            });

            // ---------- TERMS & PRIVACY ----------
            document.getElementById('termsLink')?.addEventListener('click', (e) => {
                e.preventDefault();
                alert('📱 PhoneHub Terms of Service would be displayed here.');
            });
            document.getElementById('privacyLink')?.addEventListener('click', (e) => {
                e.preventDefault();
                alert('📱 PhoneHub Privacy Policy would be displayed here.');
            });

            // ---------- SOCIAL LOGIN ----------
            document.getElementById('googleSignupBtn')?.addEventListener('click', (e) => {
                e.preventDefault();
                alert('📱 Google sign-up would be implemented here.\n\nWelcome to PhoneHub!');
            });
            document.getElementById('appleSignupBtn')?.addEventListener('click', (e) => {
                e.preventDefault();
                alert('📱 Apple sign-up would be implemented here.\n\nWelcome to PhoneHub!');
            });

            // ---------- SIGNUP FORM ----------
            document.getElementById('signupForm')?.addEventListener('submit', function(e) {
                e.preventDefault();

                const fullName = document.getElementById('fullName')?.value;
                const email = document.getElementById('email')?.value;
                const password = document.getElementById('signup-password')?.value;
                const confirm = document.getElementById('signup-confirm-password')?.value;
                const termsCheck = document.getElementById('terms');

                if (!fullName || !email) {
                    alert('📱 Please enter your name and email address.');
                    return;
                }

                if (password !== confirm) {
                    alert('⚠️ Passwords do not match. Please re-enter your password.');
                    return;
                }

                if (password && password.length < 6) {
                    alert('🔐 Password must be at least 6 characters long.');
                    return;
                }

                if (!termsCheck.checked) {
                    alert('📜 Please accept the Terms of Service and Privacy Policy to continue.');
                    return;
                }

                // Redirect to login after successful signup
                window.location.href = 'login.html';
            });

            // Console Easter Egg
            console.log('%c📱 PhoneHub Mobile Store', 'font-size:24px; font-weight:bold; color:#FF6B6B;');
            console.log('%cJoin the PhoneHub community! Your tech journey starts here.', 'font-size:14px; color:#FFD93D;');
        })();
    </script>

</body>
</html>
